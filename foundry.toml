[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc = "0.8.19"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
verbosity = 2

remappings = [
    "@flarenetwork/=node_modules/@flarenetwork/",
    "forge-std/=lib/forge-std/src/"
]

# Flare Mainnet
[rpc_endpoints]
flare = "https://flare-api.flare.network/ext/C/rpc"
coston2 = "https://coston2-api.flare.network/ext/C/rpc"
localhost = "http://127.0.0.1:8545"

# Etherscan verification (Flare explorers)
[etherscan]
flare = { key = "", url = "https://flare-explorer.flare.network/api" }
coston2 = { key = "", url = "https://coston2-explorer.flare.network/api" }

# Formatter
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"
single_line_statement_blocks = "preserve"
